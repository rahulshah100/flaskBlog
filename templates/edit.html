{% extends "layout.html" %}
{% block body %}
    <!-- Page Header -->
    <header class="masthead" style="background-image: url('{{ url_for('static', filename='img/admin.jpg') }}')">
      <div class="overlay"></div>
      <div class="container">
        <div class="row">
          <div class="col-lg-8 col-md-10 mx-auto">
            <div class="site-heading">
              <h1>Admin Panel </h1>
              <span class="subheading">Manage your posts & change them</span>
            </div>
          </div>
        </div>
      </div>
    </header>

    <!-- Main Content -->
<button class="btn btn-primary"><a href="/dashboard">Dashboard Home</a></button>
<button class="btn btn-primary"><a href="logout">LogOut</a></button><hr/>
    <h1><i>Add/Edit Post</i></h1>
    <form name="sentMessage" id="contactForm" action = "/edit/{{sno}}" method="post" novalidate>
            <div class="control-group">
              <div class="form-group floating-label-form-group controls">
                <label>Title</label>
                <input type="text" class="form-control" placeholder="Title" name='title' value="{{post.title}}" />
                <p class="help-block text-danger"></p>
              </div>
            </div>
            <div class="control-group">
              <div class="form-group floating-label-form-group controls">
                <label>slug</label>
                <input type="text" class="form-control" placeholder="slug"  name="slug" value="{{post.slug}}">
                <p class="help-block text-danger"></p>
              </div>
            </div>
            <div class="control-group">
              <div class="form-group col-xs-12 floating-label-form-group controls">
                <label>Content</label>
                <input type="tel" class="form-control" placeholder="Content" name="content" value="{{post.content}}">
                <p class="help-block text-danger"></p>
              </div>
            </div>
            <div class="control-group">
              <div class="form-group floating-label-form-group controls">
                <label>img_file</label>
                <input type="tel" class="form-control" placeholder="Img_file" name="img_file" value="{{post.img_file}}">
                <p class="help-block text-danger"></p>
              </div>
            </div>
            <br>
            <div id="success"></div>
            <div class="form-group">
              <button type="submit" class="btn btn-primary" id="sendMessageButton">Submit</button>
            </div>
    </form>
{% endblock %}
